<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagicBotsLab Dashboard</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --line: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent2: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at 10% 0%, #0f172a 0%, var(--bg) 45%, #020617 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
    }

    .logout-btn {
      border: 1px solid #374151;
      background: #1f2937;
      color: #f8fafc;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .value {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      word-break: break-word;
    }

    .value.small {
      font-size: 16px;
      font-weight: 600;
    }

    .ok {
      color: var(--accent);
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">MagicBotsLab Dashboard</div>
      <button class="logout-btn" id="logoutBtn" type="button">Disconnect</button>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Full Name</h3>
        <div class="value small" id="fullName">Loading...</div>
      </div>
      <div class="card">
        <h3>Account Balance</h3>
        <div class="value" id="balance">--</div>
      </div>
      <div class="card">
        <h3>Account Type</h3>
        <div class="value small" id="accountType">--</div>
      </div>
      <div class="card">
        <h3>Account ID</h3>
        <div class="value small" id="accountId">--</div>
      </div>
      <div class="card">
        <h3>Currency</h3>
        <div class="value small" id="currency">--</div>
      </div>
      <div class="card">
        <h3>Connection</h3>
        <div class="value small ok" id="connectionState">Connected</div>
      </div>
    </div>

    <div class="status" id="statusText"></div>
  </div>

  <script>
    const DERIV_OAUTH_CLIENT_ID = "338udJBKn1EbT7Tc29Snv";
    const DERIV_ACCESS_TOKEN_KEY = "deriv_access_token";
    const ACCOUNTS_ENDPOINT = "https://api.derivws.com/trading/v1/options/accounts";

    function $(id) {
      return document.getElementById(id);
    }

    function setStatus(message) {
      $("statusText").textContent = message || "";
    }

    function setField(id, value) {
      const el = $(id);
      if (el) el.textContent = value ?? "--";
    }

    function pickAccount(payload) {
      if (!payload) return null;
      if (Array.isArray(payload.accounts) && payload.accounts.length) return payload.accounts[0];
      if (Array.isArray(payload.data) && payload.data.length) return payload.data[0];
      if (payload.account) return payload.account;
      return null;
    }

    function resolveValue(account, keys, fallback = "--") {
      for (const k of keys) {
        if (account && account[k] !== undefined && account[k] !== null && account[k] !== "") {
          return account[k];
        }
      }
      return fallback;
    }

    async function loadDashboard() {
      const token = localStorage.getItem(DERIV_ACCESS_TOKEN_KEY);
      if (!token) {
        window.location.href = "index.html";
        return;
      }

      try {
        const response = await fetch(ACCOUNTS_ENDPOINT, {
          headers: {
            "Authorization": `Bearer ${token}`,
            "Deriv-App-ID": DERIV_OAUTH_CLIENT_ID
          }
        });

        if (!response.ok) {
          throw new Error(`Unable to load account (${response.status})`);
        }

        const payload = await response.json();
        const account = pickAccount(payload) || {};

        const fullName = resolveValue(account, ["full_name", "fullname", "name"], "Connected user");
        const accountId = resolveValue(account, ["account_id", "loginid", "id"]);
        const currency = resolveValue(account, ["currency"]);
        const accountType = resolveValue(account, ["account_type", "type", "platform"], "Deriv");
        const balanceRaw = resolveValue(account, ["balance", "amount"], null);
        const balance = balanceRaw === null
          ? "--"
          : `${Number(balanceRaw).toLocaleString(undefined, { maximumFractionDigits: 2 })} ${currency !== "--" ? currency : ""}`.trim();

        setField("fullName", fullName);
        setField("accountId", accountId);
        setField("currency", currency);
        setField("accountType", accountType);
        setField("balance", balance);
        setStatus("Account data loaded successfully.");
      } catch (err) {
        setField("connectionState", "Error");
        setStatus("Connected, but failed to load account details. Please reconnect.");
      }
    }

    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem(DERIV_ACCESS_TOKEN_KEY);
      window.location.href = "index.html";
    });

    loadDashboard();
  </script>
</body>
</html>
