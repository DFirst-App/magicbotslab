<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Bots Lab Dashboard</title>
  <style>
    :root {
      --bg: #060b18;
      --text: #e6edf7;
      --muted: #8fa3c0;
      --accent: #22c55e;
      --accent2: #3b82f6;
      --soft: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(59, 130, 246, 0.18), transparent 36%),
        radial-gradient(circle at 90% 0%, rgba(34, 197, 94, 0.14), transparent 36%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .topbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(20px, 4vw, 30px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .primary-btn {
      border: 0;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(29, 78, 216, 0.95));
      color: #ffffff;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.3);
    }

    .logout-btn {
      border: 0;
      background: rgba(148, 163, 184, 0.15);
      color: #f8fafc;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .overview {
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
    }

    .overview-main {
      padding: 18px 0 8px;
    }

    .overview-main .eyebrow {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .overview-main .name {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 800;
      line-height: 1.15;
      margin: 0;
      word-break: break-word;
    }

    .overview-main .account-type {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .balance-panel {
      background: linear-gradient(155deg, rgba(59, 130, 246, 0.24), rgba(15, 23, 42, 0.2));
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(6px);
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .balance-label {
      color: #cbd5e1;
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .balance-value {
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 800;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    .live-pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      background: rgba(34, 197, 94, 0.18);
      color: #bbf7d0;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 2px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.7);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(165deg, rgba(15, 23, 42, 0.55), rgba(15, 23, 42, 0.35));
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(4px);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
    }

    .value {
      font-size: 24px;
      font-weight: 800;
      color: #f8fafc;
      word-break: break-word;
      letter-spacing: -0.02em;
    }

    .value.small {
      font-size: 17px;
      font-weight: 600;
    }

    .ok {
      color: var(--accent);
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      background: rgba(148, 163, 184, 0.08);
      border-radius: 12px;
      padding: 10px 12px;
    }

    @media (max-width: 900px) {
      .overview {
        grid-template-columns: 1fr;
      }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="brand-title">Magic Bots Lab Dashboard</h1>
        <div class="brand-sub">Connected account profile</div>
      </div>
      <div class="topbar-actions">
        <button class="primary-btn" id="tradingBotsBtn" type="button">Trading Bots</button>
        <button class="logout-btn" id="logoutBtn" type="button">Disconnect</button>
      </div>
    </div>

    <section class="overview">
      <div class="overview-main">
        <div class="eyebrow">Account Holder</div>
        <h2 class="name" id="fullName">Loading...</h2>
        <div class="account-type" id="accountType">--</div>
      </div>
      <div class="balance-panel">
        <div class="balance-label">Live Balance</div>
        <div class="balance-value" id="balance">--</div>
        <div class="live-pill"><span class="live-dot"></span><span id="connectionState">Connected</span></div>
      </div>
    </section>

    <div class="grid">
      <div class="card">
        <h3>Account ID</h3>
        <div class="value small" id="accountId">--</div>
      </div>
      <div class="card">
        <h3>Currency</h3>
        <div class="value small" id="currency">--</div>
      </div>
      <div class="card">
        <h3>Connection Quality</h3>
        <div class="value small ok" id="connectionStateMirror">Live</div>
      </div>
      <div class="card">
        <h3>Account Category</h3>
        <div class="value small" id="accountCategory">--</div>
      </div>
      <div class="card">
        <h3>Platform</h3>
        <div class="value small" id="platform">--</div>
      </div>
      <div class="card">
        <h3>Country</h3>
        <div class="value small" id="country">--</div>
      </div>
      <div class="card">
        <h3>Leverage</h3>
        <div class="value small" id="leverage">--</div>
      </div>
      <div class="card">
        <h3>Account Status</h3>
        <div class="value small" id="accountStatus">--</div>
      </div>
      <div class="card">
        <h3>Account Created</h3>
        <div class="value small" id="accountCreated">--</div>
      </div>
    </div>

    <div class="status" id="statusText"></div>
  </div>

  <script>
    const DERIV_OAUTH_CLIENT_ID = "338udJBKn1EbT7Tc29Snv";
    const DERIV_ACCESS_TOKEN_KEY = "deriv_access_token";
    const DERIV_OAUTH_SESSION_KEY = "deriv_oauth_session";
    const ACCOUNTS_ENDPOINT = "https://api.derivws.com/trading/v1/options/accounts";
    const OTP_ENDPOINT_BASE = "https://api.derivws.com/trading/v1/options/accounts";
    const TOKEN_URL = "https://auth.deriv.com/oauth2/token";

    let liveWs = null;
    let liveReconnectTimer = null;
    let selectedRealAccountId = null;

    function $(id) {
      return document.getElementById(id);
    }

    function setStatus(message) {
      $("statusText").textContent = message || "";
    }

    function setField(id, value) {
      const el = $(id);
      if (el) el.textContent = value ?? "--";
      if (id === "connectionState") {
        setField("connectionStateMirror", value ?? "--");
      }
    }

    function pickAccount(payload) {
      if (!payload) return null;
      if (Array.isArray(payload.accounts) && payload.accounts.length) return payload.accounts[0];
      if (Array.isArray(payload.data) && payload.data.length) return payload.data[0];
      if (payload.account) return payload.account;
      return null;
    }

    function extractAccounts(payload) {
      if (!payload) return [];
      if (Array.isArray(payload.accounts)) return payload.accounts;
      if (Array.isArray(payload.data)) return payload.data;
      if (Array.isArray(payload.data?.accounts)) return payload.data.accounts;
      const one = pickAccount(payload);
      return one ? [one] : [];
    }

    function isRealAccount(account) {
      const type = String(account?.account_type || account?.type || "").toLowerCase();
      const loginid = String(account?.account_id || account?.loginid || "");
      if (type.includes("real")) return true;
      if (type.includes("demo") || type.includes("virtual")) return false;
      if (loginid.startsWith("CR")) return true;
      if (loginid.startsWith("VRTC")) return false;
      return false;
    }

    function choosePreferredAccount(accounts) {
      if (!accounts.length) return null;
      const real = accounts.find(isRealAccount);
      return real || accounts[0];
    }

    function deriveDisplayName(accounts, preferredAccount) {
      const fromPreferred = resolveValue(preferredAccount, ["full_name", "fullname", "name", "owner_name", "display_name"], "");
      if (String(fromPreferred).trim()) return String(fromPreferred).trim();

      const withName = (accounts || []).find((acc) => {
        const n = resolveValue(acc, ["full_name", "fullname", "name", "owner_name", "display_name"], "");
        return String(n).trim().length > 0;
      });
      if (withName) {
        return String(resolveValue(withName, ["full_name", "fullname", "name", "owner_name", "display_name"], "Connected User")).trim();
      }

      const loginId = resolveValue(preferredAccount, ["account_id", "loginid", "id"], "");
      if (String(loginId).trim()) return `Connected User (${loginId})`;
      return "Connected User";
    }

    function accountDisplayType(account) {
      const type = String(resolveValue(account, ["account_type", "type", "platform"], "Deriv"));
      const real = isRealAccount(account);
      return real ? `Real (${type})` : `Demo (${type})`;
    }

    function getStoredSession() {
      try {
        const raw = localStorage.getItem(DERIV_OAUTH_SESSION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function saveSession(session) {
      localStorage.setItem(DERIV_OAUTH_SESSION_KEY, JSON.stringify(session));
      localStorage.setItem(DERIV_ACCESS_TOKEN_KEY, session.access_token);
    }

    async function getValidAccessToken() {
      const session = getStoredSession();
      if (session?.access_token && session?.expires_at && Date.now() < session.expires_at - 60_000) {
        return session.access_token;
      }

      if (!session?.refresh_token) {
        return localStorage.getItem(DERIV_ACCESS_TOKEN_KEY);
      }

      const body = new URLSearchParams({
        grant_type: "refresh_token",
        client_id: DERIV_OAUTH_CLIENT_ID,
        refresh_token: session.refresh_token
      });

      const response = await fetch(TOKEN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });
      if (!response.ok) throw new Error("Token refresh failed");
      const tokenData = await response.json();
      if (!tokenData.access_token) throw new Error("Missing refreshed access token");

      const updated = {
        access_token: tokenData.access_token,
        refresh_token: tokenData.refresh_token || session.refresh_token,
        expires_at: Date.now() + ((tokenData.expires_in || 3600) * 1000)
      };
      saveSession(updated);
      return updated.access_token;
    }

    async function getLiveWebSocketUrl(token, accountId) {
      const response = await fetch(`${OTP_ENDPOINT_BASE}/${accountId}/otp`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Deriv-App-ID": DERIV_OAUTH_CLIENT_ID
        }
      });
      if (!response.ok) throw new Error(`OTP error (${response.status})`);
      const payload = await response.json();
      const wsUrl = payload?.data?.url || payload?.url;
      if (!wsUrl) throw new Error("Missing websocket url");
      return wsUrl;
    }

    function connectLiveUpdates(wsUrl) {
      if (liveWs) {
        try { liveWs.close(); } catch (_) {}
      }
      if (liveReconnectTimer) {
        clearTimeout(liveReconnectTimer);
      }

      liveWs = new WebSocket(wsUrl);
      setField("connectionState", "Connecting...");
      setStatus("Connecting to live real-time updates...");

      liveWs.onopen = () => {
        setField("connectionState", "Connected (Live)");
        setStatus("Connected to live stream. Balance updates in real time.");
        liveWs.send(JSON.stringify({ balance: 1, subscribe: 1, req_id: 1 }));
        liveWs.send(JSON.stringify({ transaction: 1, subscribe: 1, req_id: 2 }));
      };

      liveWs.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.error) return;
          if (msg.msg_type === "balance" && msg.balance) {
            const ccy = msg.balance.currency || $("currency").textContent || "";
            const bal = Number(msg.balance.balance);
            if (!Number.isNaN(bal)) {
              setField("balance", `${bal.toLocaleString(undefined, { maximumFractionDigits: 2 })} ${ccy}`.trim());
            }
            if (msg.balance.loginid) {
              setField("accountId", msg.balance.loginid);
            }
          }
        } catch (_) {}
      };

      liveWs.onclose = () => {
        setField("connectionState", "Reconnecting...");
        liveReconnectTimer = setTimeout(async () => {
          try {
            const token = await getValidAccessToken();
            if (!token || !selectedRealAccountId) return;
            const nextUrl = await getLiveWebSocketUrl(token, selectedRealAccountId);
            connectLiveUpdates(nextUrl);
          } catch (_) {
            setField("connectionState", "Disconnected");
            setStatus("Live updates disconnected. Reconnect failed.");
          }
        }, 2500);
      };

      liveWs.onerror = () => {
        setField("connectionState", "Connection error");
      };
    }

    function resolveValue(account, keys, fallback = "--") {
      for (const k of keys) {
        if (account && account[k] !== undefined && account[k] !== null && account[k] !== "") {
          return account[k];
        }
      }
      return fallback;
    }

    function formatDate(value) {
      if (!value || value === "--") return "--";
      const numeric = Number(value);
      const millis = Number.isFinite(numeric) && numeric > 0
        ? (numeric < 10_000_000_000 ? numeric * 1000 : numeric)
        : NaN;
      const date = Number.isFinite(millis) ? new Date(millis) : new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString();
    }

    async function loadDashboard() {
      const token = await getValidAccessToken();
      if (!token) {
        window.location.href = "index.html";
        return;
      }

      try {
        const response = await fetch(ACCOUNTS_ENDPOINT, {
          headers: {
            "Authorization": `Bearer ${token}`,
            "Deriv-App-ID": DERIV_OAUTH_CLIENT_ID
          }
        });

        if (!response.ok) {
          throw new Error(`Unable to load account (${response.status})`);
        }

        const payload = await response.json();
        const accounts = extractAccounts(payload);
        const account = choosePreferredAccount(accounts) || {};
        selectedRealAccountId = resolveValue(account, ["account_id", "loginid", "id"], null);

        const fullName = deriveDisplayName(accounts, account);
        const accountId = resolveValue(account, ["account_id", "loginid", "id"]);
        const currency = resolveValue(account, ["currency"]);
        const accountType = accountDisplayType(account);
        const accountCategory = isRealAccount(account) ? "Real" : "Demo";
        const platform = resolveValue(account, ["platform", "account_type", "type"], "--");
        const country = resolveValue(account, ["country", "residence", "country_code"], "--");
        const leverage = resolveValue(account, ["leverage", "max_leverage"], "--");
        const accountStatus = resolveValue(account, ["status", "account_status", "state"], "--");
        const accountCreated = formatDate(resolveValue(account, ["created_at", "created", "created_time"], "--"));
        const balanceRaw = resolveValue(account, ["balance", "amount"], null);
        const balance = balanceRaw === null
          ? "--"
          : `${Number(balanceRaw).toLocaleString(undefined, { maximumFractionDigits: 2 })} ${currency !== "--" ? currency : ""}`.trim();

        setField("fullName", fullName);
        setField("accountId", accountId);
        setField("currency", currency);
        setField("accountType", accountType);
        setField("accountCategory", accountCategory);
        setField("platform", platform);
        setField("country", country);
        setField("leverage", leverage);
        setField("accountStatus", accountStatus);
        setField("accountCreated", accountCreated);
        setField("balance", balance);
        setStatus(isRealAccount(account)
          ? "Real account connected. Initial details loaded."
          : "Demo account detected. Connect a real account on Deriv to view live real details.");

        if (selectedRealAccountId && isRealAccount(account)) {
          const wsUrl = await getLiveWebSocketUrl(token, selectedRealAccountId);
          connectLiveUpdates(wsUrl);
        } else {
          setField("connectionState", "Connected");
        }
      } catch (err) {
        setField("connectionState", "Error");
        setStatus("Connected, but failed to load account details. Please reconnect.");
      }
    }

    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem(DERIV_ACCESS_TOKEN_KEY);
      localStorage.removeItem(DERIV_OAUTH_SESSION_KEY);
      if (liveWs) {
        try { liveWs.close(); } catch (_) {}
      }
      window.location.href = "index.html";
    });

    $("tradingBotsBtn").addEventListener("click", () => {
      window.location.href = "trading-dashboard.html";
    });

    loadDashboard();
  </script>
</body>
</html>
