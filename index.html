<body>
  <main class="landing">

      <button type="button" class="ghost-btn connect-trigger" id="startBtn">learn more</button>
    </nav>

    <section class="hero-copy">
      <h1>Landing Page</h1>
      <p>Connect your Deriv account to run MagicBotsLab automations, access MT5 bot downloads, and manage fully automated trading systems from one control dashboard.</p>
      <div class="status" id="statusText"></div>
    </section>

    <div class="wave"></div>

    <span class="dot b"></span>

    <span class="dot d"></span>

    <div class="bottom-bar">
      <button type="button" class="cta-btn connect-trigger" id="connectBtn">sign up</button>
      <div class="footer-dots">.............</div>
    </div>
  </main>
  <script>
    const DERIV_OAUTH_CLIENT_ID = "338udJBKn1EbT7Tc29Snv";
    const OAUTH_URL = "https://auth.deriv.com/oauth2/auth";
    const TOKEN_URL = "https://auth.deriv.com/oauth2/token";
    const PKCE_VERIFIER_KEY = "pkce_code_verifier";
    const OAUTH_STATE_KEY = "oauth_state";
    const DERIV_ACCESS_TOKEN_KEY = "deriv_access_token";
    const DERIV_OAUTH_SESSION_KEY = "deriv_oauth_session";

    function randomString(length = 64) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
      const arr = new Uint8Array(length);
      crypto.getRandomValues(arr);
      return Array.from(arr, (v) => chars[v % chars.length]).join("");
    }

    function toBase64Url(bytes) {
      return btoa(String.fromCharCode(...bytes))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/, "");
    }

    async function createCodeChallenge(verifier) {
      const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
      return toBase64Url(new Uint8Array(digest));
    }

    function setStatus(message, type = "") {
      const statusEl = document.getElementById("statusText");
      if (!statusEl) return;
      statusEl.className = `status ${type}`.trim();
      statusEl.textContent = message;
    }

    async function startOAuthLogin() {
      const triggers = document.querySelectorAll(".connect-trigger");
      const connectBtn = document.getElementById("connectBtn");
      const startBtn = document.getElementById("startBtn");
      triggers.forEach((btn) => { btn.disabled = true; });
      if (connectBtn) connectBtn.textContent = "Connecting...";
      if (startBtn) startBtn.textContent = "Starting...";

      try {
        const verifier = randomString(64);
        const state = randomString(32);
        const challenge = await createCodeChallenge(verifier);
        const redirectUri = `${window.location.origin}${window.location.pathname}`;

        sessionStorage.setItem(PKCE_VERIFIER_KEY, verifier);
        sessionStorage.setItem(OAUTH_STATE_KEY, state);

        const authUrl = new URL(OAUTH_URL);
        authUrl.searchParams.set("response_type", "code");
        authUrl.searchParams.set("client_id", DERIV_OAUTH_CLIENT_ID);
        authUrl.searchParams.set("redirect_uri", redirectUri);
        authUrl.searchParams.set("scope", "trade account_manage");
        authUrl.searchParams.set("state", state);
        authUrl.searchParams.set("code_challenge", challenge);
        authUrl.searchParams.set("code_challenge_method", "S256");

        window.location.href = authUrl.toString();
      } catch (error) {
        setStatus("Unable to start OAuth flow. Please try again.", "error");
        triggers.forEach((btn) => { btn.disabled = false; });
        if (connectBtn) connectBtn.textContent = "sign up";
        if (startBtn) startBtn.textContent = "learn more";
      }
    }

    async function exchangeCodeForToken(code) {
      const verifier = sessionStorage.getItem(PKCE_VERIFIER_KEY);
      if (!verifier) throw new Error("Missing PKCE verifier");

      const redirectUri = `${window.location.origin}${window.location.pathname}`;
      const body = new URLSearchParams({
        grant_type: "authorization_code",
        client_id: DERIV_OAUTH_CLIENT_ID,
        code,
        code_verifier: verifier,
        redirect_uri: redirectUri
      });

      const response = await fetch(TOKEN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });

      if (!response.ok) {
        throw new Error(`Token exchange failed (${response.status})`);
      }

      const tokenData = await response.json();
      if (!tokenData.access_token) {
        throw new Error("Missing access token");
      }

      localStorage.setItem(DERIV_ACCESS_TOKEN_KEY, tokenData.access_token);
      localStorage.setItem(
        DERIV_OAUTH_SESSION_KEY,
        JSON.stringify({
          access_token: tokenData.access_token,
          refresh_token: tokenData.refresh_token || null,
          expires_at: Date.now() + ((tokenData.expires_in || 3600) * 1000)
        })
      );
      sessionStorage.removeItem(PKCE_VERIFIER_KEY);
      sessionStorage.removeItem(OAUTH_STATE_KEY);
      return tokenData.access_token;
    }

    async function handleOAuthCallback() {
      const params = new URLSearchParams(window.location.search);
      const error = params.get("error");
      const code = params.get("code");
      const returnedState = params.get("state");

      if (error) {
        setStatus("Authorization was cancelled or failed.", "error");
        return;
      }

      if (!code) return;

      const storedState = sessionStorage.getItem(OAUTH_STATE_KEY);
      if (!storedState || returnedState !== storedState) {
        setStatus("OAuth state verification failed. Please reconnect.", "error");
        return;
      }

      setStatus("Authorization successful. Preparing dashboard...", "success");
      try {
        await exchangeCodeForToken(code);
        window.location.href = "dashboard.html";
      } catch (e) {
        setStatus("Connected but token exchange failed. Please try again.", "error");
      }
    }

    document.querySelectorAll(".connect-trigger").forEach((btn) => {
      btn.addEventListener("click", startOAuthLogin);
    });
    handleOAuthCallback();
  </script>
