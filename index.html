<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagicBotsLab Landing</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    .card {
      width: min(420px, 92vw);
      padding: 28px;
      border-radius: 16px;
      background: #111827;
      border: 1px solid #1f2937;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    p {
      margin: 0 0 20px;
      color: #9ca3af;
    }

    .connect-btn {
      width: 100%;
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: #2563eb;
      cursor: default;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>MagicBotsLab</h1>
    <p>Landing page</p>
    <button type="button" class="connect-btn">Connect Account</button>
  </main>
</body>
</html>
